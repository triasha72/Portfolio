<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-label="Solid rocket motor thrust time-series with anomaly detection">
  <defs>
    <linearGradient id="sr-bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#04191f"/><stop offset="1" stop-color="#082b33"/></linearGradient>
    <linearGradient id="sr-fill" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#2dd4bf" stop-opacity=".25"/><stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/></linearGradient>
    <radialGradient id="sr-alert" cx=".5" cy=".5" r=".5"><stop stop-color="#f5a524" stop-opacity=".5"/><stop offset="1" stop-color="#f5a524" stop-opacity="0"/></radialGradient>
    <filter id="sr-glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="620" rx="38" fill="url(#sr-bg)"/>
  <g stroke="#0d333b" stroke-width="1.5" opacity=".8">
    <path d="M110 160 H840 M110 250 H840 M110 340 H840 M110 430 H840"/>
    <path d="M256 520 V150 M402 520 V150 M548 520 V150 M694 520 V150" stroke-dasharray="2 8"/>
  </g>
  <path d="M110 520 H840 M110 520 V150" stroke="#96bcbe" stroke-width="2" fill="none"/>
  <path d="M110 518 L128 300 C140 218 160 196 190 192 L360 196 C480 200 560 214 640 240 C720 266 780 330 812 420 L826 518 Z" fill="url(#sr-fill)"/>
  <path d="M110 518 L128 300 C140 218 160 196 190 192 L360 196 C480 200 560 214 640 240 C720 266 780 330 812 420 L826 518" fill="none" stroke="#2dd4bf" stroke-width="4.5" filter="url(#sr-glow)"/>
  <path d="M110 518 L126 310 C138 232 158 210 190 206 L300 208 C330 208 340 186 356 186 C372 186 378 214 410 214 C500 220 570 232 645 258 C722 284 778 344 808 428 L822 518" fill="none" stroke="#ffc46b" stroke-width="2.4" stroke-dasharray="7 7" opacity=".95"/>
  <circle cx="356" cy="196" r="44" fill="url(#sr-alert)"/>
  <circle cx="356" cy="192" r="12" fill="none" stroke="#f5a524" stroke-width="3" filter="url(#sr-glow)"/>
  <path d="M356 154 V128" stroke="#f5a524" stroke-width="2.5" stroke-dasharray="4 5"/>
  <g transform="translate(290 92)">
    <rect width="244" height="34" rx="10" fill="rgba(245,165,36,.14)" stroke="#f5a524" stroke-width="1.5"/>
    <text x="122" y="22" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="700" fill="#ffc46b">ANOMALY FLAGGED - t=1.42s</text>
  </g>
  <g transform="translate(556 380)">
    <rect width="284" height="96" rx="18" fill="rgba(4,25,31,.85)" stroke="rgba(139,238,224,.25)" stroke-width="1.5"/>
    <rect x="18" y="24" width="18" height="4" rx="2" fill="#2dd4bf"/><text x="42" y="31" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#d3efec">nominal thrust profile</text>
    <rect x="18" y="48" width="18" height="4" rx="2" fill="#ffc46b"/><text x="42" y="55" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#d3efec">observed test signal</text>
    <circle cx="27" cy="76" r="6" fill="none" stroke="#f5a524" stroke-width="2.5"/><text x="42" y="81" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#d3efec">clustered anomaly window</text>
  </g>
  <g font-family="Inter,system-ui,sans-serif" font-weight="700">
    <text x="64" y="66" font-size="26" fill="#eefbfa">SRM FAILURE DETECTION</text>
    <text x="838" y="556" font-size="13" fill="#96bcbe" text-anchor="end" font-weight="400">burn time (s)</text>
    <text x="100" y="160" font-size="13" fill="#96bcbe" text-anchor="end" font-weight="400">thrust</text>
  </g>
  <rect x="24" y="24" width="852" height="572" rx="32" fill="none" stroke="rgba(139,238,224,.18)" stroke-width="1.5"/>
</svg>
